kind = "web"
previewPath = "/video-trimmer/"
title = "Video End Trimmer"
version = "1.0.0"
id = "artifacts/video-trimmer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/video-trimmer/" ]
localPort = 25907

[services.development]
run = "pnpm --filter @workspace/video-trimmer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/video-trimmer", "run", "build" ]
publicDir = "artifacts/video-trimmer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25907"
BASE_PATH = "/video-trimmer/"
