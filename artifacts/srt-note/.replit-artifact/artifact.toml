kind = "web"
previewPath = "/srt-note/"
title = "SRT Note"
version = "1.0.0"
id = "artifacts/srt-note"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/srt-note/" ]
localPort = 21772

[services.development]
run = "pnpm --filter @workspace/srt-note run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/srt-note", "run", "build" ]
publicDir = "artifacts/srt-note/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21772"
BASE_PATH = "/srt-note/"
